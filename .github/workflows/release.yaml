name: Release Extension

on:
  push:
    tags:
      - 'v*'   # Pushing a tag (e.g. v1.2.0) runs this workflow and creates the release
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.1)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || 'main' }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Update package.json version
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          node -e "const pkg = require('./package.json'); pkg.version = '$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Updated package.json to version $VERSION"

      # Use bun install (no --frozen-lockfile): repo uses package-lock.json; Bun migrates it and does not persist bun.lockb.
      - name: Install dependencies
        run: bun install

      - name: Compile TypeScript
        run: bun run compile

      - name: Package extension
        run: bun run package

      - name: Generate release notes (on tag push)
        if: github.event_name == 'push'
        id: notes
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          git fetch --tags
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
          if [ -n "${PREV_TAG}" ]; then
            COMMIT_LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s ([%h](https://github.com/${GH_REPO}/commit/%H))" --no-merges)
          else
            COMMIT_LOG=$(git log --pretty=format:"- %s ([%h](https://github.com/${GH_REPO}/commit/%H))" --no-merges HEAD)
          fi
          {
            echo "## What's in this release"
            echo ""
            if [ -n "${COMMIT_LOG}" ]; then
              echo "${COMMIT_LOG}"
            else
              echo "_No commits in this range._"
            fi
            echo ""
            echo "## Install"
            echo ""
            echo "**From VS Code Marketplace** (recommended)"
            echo ""
            echo "Install from the [Visual Studio Code Marketplace](https://marketplace.visualstudio.com/items?itemName=the-protobuf-project.google-api-linter): open VS Code → Extensions (Ctrl+Shift+X / Cmd+Shift+X) → search **Google API Linter** → Install."
            echo ""
            echo "You can also [download the extension](https://marketplace.visualstudio.com/items?itemName=the-protobuf-project.google-api-linter) from the Marketplace page."
            echo ""
            echo "**From this release**"
            echo ""
            echo "Download the \`.vsix\` asset below and install from the command line:"
            echo "\`\`\`bash"
            echo "code --install-extension google-api-linter-${{ steps.get-version.outputs.version }}.vsix"
            echo "\`\`\`"
          } > release_notes.md
          echo "Release notes generated."

      - name: Create Release and upload VSIX (on tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            google-api-linter-${{ steps.get-version.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX to existing Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./google-api-linter-${{ steps.get-version.outputs.version }}.vsix
          asset_name: google-api-linter-${{ steps.get-version.outputs.version }}.vsix
          asset_content_type: application/vsix

      - name: Publish to VS Code Marketplace
        if: |
          (github.event_name == 'release' && github.event.release.prerelease == false) ||
          github.event_name == 'push'
        run: bun run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Commit version bump
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.get-version.outputs.version }} [skip ci]"
          git push origin HEAD:main

